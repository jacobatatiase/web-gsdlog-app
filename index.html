<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSDlog — Project Discontinued</title>
    <meta name="description" content="GSDlog has been discontinued. Thank you to everyone who showed interest.">

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://gsdlog.app/">
    <meta property="og:title" content="GSDlog — Project Discontinued">
    <meta property="og:description" content="GSDlog has been discontinued. Thank you to everyone who showed interest.">
    <meta property="og:image" content="https://gsdlog.app/icons/ios/AppIcon.appiconset/ItunesArtwork@2x.png">

    <style>
        :root {
            --bg: #0f1113;
            --panel: #14171a;
            --text: #e7eaee;
            --muted: #b7bec8;
            --line: #262a2f;
            --accent: #8dc6ff;
            --accent-2: #a5e2c6;
            --radius: 14px;
            --shadow: 0 8px 28px rgba(0,0,0,.35);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            background: var(--bg);
            color: var(--text);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .container {
            max-width: 620px;
            text-align: center;
        }

        .app-icon {
            width: 96px;
            height: 96px;
            border-radius: 22px;
            margin-bottom: 32px;
            box-shadow: var(--shadow);
        }

        h1 {
            font-size: clamp(28px, 4vw, 38px);
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 24px;
        }

        .message {
            font-size: 20px;
            color: var(--muted);
            line-height: 1.7;
            margin-bottom: 48px;
        }

        .message em {
            color: var(--accent);
            font-style: normal;
        }

        .divider {
            width: 48px;
            height: 2px;
            background: var(--line);
            margin: 0 auto 48px;
        }

        .contact {
            font-size: 15px;
            color: var(--muted);
        }

        .contact a {
            color: var(--accent);
            text-decoration: none;
        }

        .contact a:hover {
            text-decoration: underline;
        }

        footer {
            position: fixed;
            bottom: 24px;
            font-size: 13px;
            color: var(--muted);
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="icons/ios/AppIcon.appiconset/ItunesArtwork@2x.png" alt="GSDlog app icon" class="app-icon">
        <h1>GSDlog</h1>
        <p class="message">
            Thank you to everyone who showed interest in this project.
            Unfortunately, due to lack of time, GSDlog has been <em>discontinued</em> — at least for now.
        </p>
        <div class="divider"></div>
        <p class="contact">
            Questions? Reach out at <a href="mailto:hello@gsdlog.app">hello@gsdlog.app</a>
        </p>
    </div>
    <footer>&copy; 2025 &mdash; Atia AB</footer>
</body>
</html>
